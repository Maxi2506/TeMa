spring.application.name=temaJar
server.port=8080

# Configuraci\u00F3n de Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/tema?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# IA - Vertex AI con API KEY
spring.ai.vertex.ai.gemini.api-key=AIzaSyCsf9Z30eu4GvuwSWKlaPMwJNJ4rE0GTaE
spring.ai.vertex.ai.gemini.project-id=proyecto-cv-maxi
spring.ai.vertex.ai.gemini.location=us-central1
spring.ai.vertex.ai.gemini.model=gemini-1.5-flash

# L\u00EDmites de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Filtros de Seguridad (para que no bloquee los datos del CV)
spring.ai.google.ai.gemini.chat.options.safety-settings.HARASSMENT=BLOCK_NONE
spring.ai.google.ai.gemini.chat.options.safety-settings.HATE_SPEECH=BLOCK_NONE
spring.ai.google.ai.gemini.chat.options.safety-settings.SEXUALLY_EXPLICIT=BLOCK_NONE
spring.ai.google.ai.gemini.chat.options.safety-settings.DANGEROUS_CONTENT=BLOCK_NONE